<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>wormhole-web</title>
<style>
*, *::before, *::after { box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #fafafa;
  color: #212529;
  margin: 0;
  padding: 20px;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 10vh;
}
.container {
  width: 100%;
  max-width: 480px;
}
h1 {
  text-align: center;
  font-size: 24px;
  margin: 0 0 4px;
}
.subtitle {
  text-align: center;
  color: #868e96;
  font-size: 14px;
  margin: 0 0 32px;
}
.dropzone {
  border: 2px dashed #ced4da;
  border-radius: 12px;
  padding: 40px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  color: #868e96;
  font-size: 15px;
}
.dropzone:hover, .dropzone.dragover {
  border-color: #228be6;
  background: #f0f7ff;
}
.dropzone input { display: none; }
.divider {
  text-align: center;
  color: #adb5bd;
  font-size: 13px;
  margin: 20px 0;
}
.receive-row {
  display: flex;
  gap: 8px;
}
.receive-row input {
  flex: 1;
  padding: 10px 14px;
  border: 1px solid #ced4da;
  border-radius: 8px;
  font-size: 15px;
  outline: none;
}
.receive-row input:focus { border-color: #228be6; }
.btn {
  padding: 10px 20px;
  background: #228be6;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
  white-space: nowrap;
}
.btn:hover { background: #1c7ed6; }
.btn:disabled { background: #adb5bd; cursor: default; }
.btn-cancel {
  background: none;
  color: #868e96;
  border: 1px solid #ced4da;
  margin-top: 8px;
  width: 100%;
}
.btn-cancel:hover { background: #f1f3f5; color: #495057; }

/* Send status panel */
.send-status {
  border: 2px solid #228be6;
  border-radius: 12px;
  padding: 20px;
  background: #f8f9fa;
}
.file-info {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.file-icon { width: 24px; height: 24px; color: #868e96; flex-shrink: 0; }
.file-name { font-weight: 600; font-size: 14px; }
.file-size { color: #868e96; font-size: 12px; }
.code-box {
  background: #f1f3f5;
  color: #212529;
  border: 1px solid #dee2e6;
  border-radius: 8px;
  padding: 12px;
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
  font-size: 14px;
  text-align: center;
  margin-bottom: 14px;
  user-select: all;
  cursor: pointer;
}
.code-box:hover { background: #e9ecef; }
.qr-container { text-align: center; margin-bottom: 14px; }
.qr-container canvas, .qr-container img { margin: 0 auto; }
.qr-toggle {
  font-size: 11px;
  color: #868e96;
  cursor: pointer;
  text-decoration: underline;
  display: inline-block;
  margin-top: 6px;
}
.qr-toggle:hover { color: #495057; }
.progress-track {
  background: #e9ecef;
  border-radius: 4px;
  height: 6px;
  margin-bottom: 6px;
  overflow: hidden;
}
.progress-bar {
  background: #228be6;
  height: 100%;
  border-radius: 4px;
  width: 0%;
  transition: width 0.2s;
}
.progress-bar.done { background: #228be6; }
.status-text {
  text-align: center;
  color: #868e96;
  font-size: 13px;
}
.status-text.error { color: #e03131; }
.status-text.done { color: #212529; font-weight: 600; }

/* Receive status */
.receive-status {
  text-align: center;
  padding: 20px;
  border: 1px solid #ced4da;
  border-radius: 12px;
}
.spinner {
  display: inline-block;
  width: 20px; height: 20px;
  border: 2px solid #e9ecef;
  border-top-color: #228be6;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin-right: 8px;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

.hidden { display: none; }
</style>
</head>
<body>
<div class="container">
  <h1>wormhole-web</h1>
  <p class="subtitle">Send and receive files securely</p>

  <!-- Send: initial state -->
  <div id="send-initial">
    <div class="dropzone" id="dropzone" onclick="document.getElementById('file-input').click()">
      Drop a file here or click to browse
      <input type="file" id="file-input">
    </div>
  </div>

  <!-- Send: status state -->
  <div id="send-status" class="hidden">
    <div class="send-status">
      <div class="file-info">
        <svg class="file-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <div>
          <div class="file-name" id="send-filename"></div>
          <div class="file-size" id="send-filesize"></div>
        </div>
      </div>
      <div id="send-code-section" class="hidden">
        <div class="code-box" id="send-code" title="Click to copy"></div>
        <div class="qr-container">
          <div id="qr-display"></div>
          <span class="qr-toggle" id="qr-toggle" onclick="toggleQrMode()">Show wormhole QR</span>
        </div>
      </div>
      <div class="progress-track"><div class="progress-bar" id="send-progress"></div></div>
      <div class="status-text" id="send-status-text">allocating code...</div>
      <button class="btn btn-cancel" onclick="cancelSend()">Cancel</button>
    </div>
  </div>

  <div class="divider">&mdash; or &mdash;</div>

  <!-- Receive: initial state -->
  <div id="receive-initial">
    <div class="receive-row">
      <input type="text" id="receive-code" placeholder="Enter wormhole code"
             onkeydown="if(event.key==='Enter')startReceive()">
      <button class="btn" onclick="startReceive()">Receive</button>
    </div>
  </div>

  <!-- Receive: status state -->
  <div id="receive-status" class="hidden">
    <div class="receive-status">
      <span class="spinner"></span>
      <span id="receive-status-text">starting download...</span>
      <button class="btn btn-cancel" onclick="cancelReceive()">Cancel</button>
    </div>
  </div>
</div>

<script src="/static/qr.js"></script>
<script>
// --- State ---
let sendXhr = null;
let currentCode = null;
let qrModeWeb = true; // true = web URL, false = wormhole-transfer:

// --- Helpers ---
function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
}

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

// --- QR ---
function renderQr(text) {
  const container = document.getElementById('qr-display');
  container.innerHTML = '';
  if (typeof qrcode === 'undefined') return;
  const qr = qrcode(0, 'M');
  qr.addData(text, 'Byte');
  qr.make();
  // cellSize=6 for better scannability on phone cameras
  container.innerHTML = qr.createSvgTag(6, 0);
}

function toggleQrMode() {
  qrModeWeb = !qrModeWeb;
  const toggle = document.getElementById('qr-toggle');
  if (qrModeWeb) {
    toggle.textContent = 'Show wormhole QR';
    renderQr(window.location.origin + '/receive/' + currentCode);
  } else {
    toggle.textContent = 'Show web link QR';
    renderQr('wormhole-transfer:' + currentCode);
  }
}

// --- Send ---
function startSend(file) {
  hide('send-initial');
  show('send-status');

  document.getElementById('send-filename').textContent = file.name;
  document.getElementById('send-filesize').textContent = formatSize(file.size);
  document.getElementById('send-status-text').textContent = 'allocating code...';
  document.getElementById('send-status-text').className = 'status-text';
  document.getElementById('send-progress').style.width = '0%';
  document.getElementById('send-progress').className = 'progress-bar';
  hide('send-code-section');

  // Step 1: Get a code
  fetch('/send/new', { method: 'POST' })
    .then(r => {
      if (!r.ok) throw new Error('Server error: ' + r.status);
      return r.text();
    })
    .then(code => {
      code = code.trim();
      currentCode = code;
      document.getElementById('send-code').textContent = 'wormhole receive ' + code;
      show('send-code-section');
      qrModeWeb = true;
      document.getElementById('qr-toggle').textContent = 'Show wormhole QR';
      renderQr(window.location.origin + '/receive/' + code);
      document.getElementById('send-status-text').textContent = 'uploading... waiting for receiver';

      // Step 2: Upload
      uploadFile(file, code);
    })
    .catch(err => {
      document.getElementById('send-status-text').textContent = 'Error: ' + err.message;
      document.getElementById('send-status-text').className = 'status-text error';
    });
}

function uploadFile(file, code) {
  const xhr = new XMLHttpRequest();
  sendXhr = xhr;

  xhr.upload.onprogress = function(e) {
    if (e.lengthComputable) {
      const pct = Math.round((e.loaded / e.total) * 100);
      document.getElementById('send-progress').style.width = pct + '%';
    }
  };

  let lastResponseLen = 0;
  xhr.onprogress = function() {
    // Parse new lines from response
    const text = xhr.responseText.substring(lastResponseLen);
    lastResponseLen = xhr.responseText.length;
    const lines = text.split('\n').filter(l => l.trim());
    for (const line of lines) {
      if (line.startsWith('transferring')) {
        document.getElementById('send-status-text').textContent = 'transferring...';
      } else if (line.startsWith('transfer complete')) {
        markSendComplete();
      } else if (line.startsWith('error:')) {
        document.getElementById('send-status-text').textContent = line;
        document.getElementById('send-status-text').className = 'status-text error';
      }
    }
  };

  xhr.onload = function() {
    sendXhr = null;
    if (xhr.status !== 200) {
      document.getElementById('send-status-text').textContent = 'Error: server returned ' + xhr.status;
      document.getElementById('send-status-text').className = 'status-text error';
    }
    // Check final response for transfer complete
    if (xhr.responseText.includes('transfer complete')) {
      markSendComplete();
    }
  };

  xhr.onerror = function() {
    sendXhr = null;
    document.getElementById('send-status-text').textContent = 'Connection error';
    document.getElementById('send-status-text').className = 'status-text error';
  };

  xhr.open('PUT', '/send/' + code);
  xhr.setRequestHeader('X-Wormhole-Filename', file.name);
  xhr.setRequestHeader('Content-Length', file.size);
  xhr.send(file);
}

function markSendComplete() {
  hide('send-code-section');
  document.getElementById('send-progress').style.width = '100%';
  document.getElementById('send-progress').className = 'progress-bar done';
  document.getElementById('send-status-text').textContent = 'Transfer complete!';
  document.getElementById('send-status-text').className = 'status-text done';
}

function cancelSend() {
  if (sendXhr) { sendXhr.abort(); sendXhr = null; }
  currentCode = null;
  hide('send-status');
  show('send-initial');
  document.getElementById('file-input').value = '';
}

// --- Receive ---
function startReceive() {
  const input = document.getElementById('receive-code');
  const code = input.value.trim();
  if (!code) return;

  hide('receive-initial');
  show('receive-status');
  document.getElementById('receive-status-text').textContent = 'starting download...';

  // Trigger download via hidden anchor
  const a = document.createElement('a');
  a.href = '/receive/' + encodeURIComponent(code);
  a.download = '';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  // Reset after a moment
  setTimeout(() => {
    hide('receive-status');
    show('receive-initial');
    input.value = '';
  }, 3000);
}

function cancelReceive() {
  hide('receive-status');
  show('receive-initial');
}

// --- Drag and drop ---
const dz = document.getElementById('dropzone');

dz.addEventListener('dragover', e => {
  e.preventDefault();
  dz.classList.add('dragover');
});

dz.addEventListener('dragleave', () => {
  dz.classList.remove('dragover');
});

dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('dragover');
  if (e.dataTransfer.files.length > 0) {
    startSend(e.dataTransfer.files[0]);
  }
});

document.getElementById('file-input').addEventListener('change', function() {
  if (this.files.length > 0) {
    startSend(this.files[0]);
  }
});

// Copy code on click
document.getElementById('send-code').addEventListener('click', function() {
  navigator.clipboard.writeText(this.textContent).then(() => {
    const orig = this.textContent;
    this.textContent = 'Copied!';
    setTimeout(() => { this.textContent = orig; }, 1000);
  });
});
</script>
</body>
</html>
