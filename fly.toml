app = 'wormhole-web'
primary_region = 'ams'

[build]
  dockerfile = 'Containerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

# WebSocket transit bridge for WASM E2E encryption
[[services]]
  protocol = 'tcp'
  internal_port = 4002

  [[services.ports]]
    port = 4002
    handlers = ['tls', 'http']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  count = 2
